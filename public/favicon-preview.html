<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Fluxia — Favicon Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #F8FAFC;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 60px;
    }
    h1 { font-size: 15px; color: #94A3B8; letter-spacing: .08em; text-transform: uppercase; }
    .row { display: flex; gap: 56px; align-items: flex-end; }
    .option { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .sizes { display: flex; align-items: flex-end; gap: 20px; }
    .label { font-size: 13px; color: #64748B; text-align: center; }
    .label strong { display: block; font-size: 15px; color: #0F172A; margin-bottom: 2px; }
    .size-label { font-size: 11px; color: #94A3B8; text-align: center; margin-top: 6px; }
  </style>
</head>
<body>

  <h1>Fluxia · Favicon options</h1>

  <div class="row">

    <!-- Option 1 : F géométrique -->
    <div class="option">
      <div class="sizes">
        <div>
          <svg width="128" height="128" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <rect x="9"   y="7"  width="4.5" height="18" fill="white"/>
            <rect x="9"   y="7"  width="14"  height="4.5" fill="white"/>
            <rect x="9"   y="15" width="10"  height="4"   fill="white"/>
          </svg>
          <div class="size-label">128px</div>
        </div>
        <div>
          <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <rect x="9"   y="7"  width="4.5" height="18" fill="white"/>
            <rect x="9"   y="7"  width="14"  height="4.5" fill="white"/>
            <rect x="9"   y="15" width="10"  height="4"   fill="white"/>
          </svg>
          <div class="size-label">32px</div>
        </div>
        <div>
          <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <rect x="9"   y="7"  width="4.5" height="18" fill="white"/>
            <rect x="9"   y="7"  width="14"  height="4.5" fill="white"/>
            <rect x="9"   y="15" width="10"  height="4"   fill="white"/>
          </svg>
          <div class="size-label">16px</div>
        </div>
      </div>
      <div class="label"><strong>Option 1</strong>F géométrique</div>
    </div>

    <!-- Option 2 : FX monogramme -->
    <div class="option">
      <div class="sizes">
        <div>
          <svg width="128" height="128" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#0F172A"/>
            <rect x="4"  y="7"    width="3.5" height="18"  fill="white"/>
            <rect x="4"  y="7"    width="10"  height="3.5" fill="white"/>
            <rect x="4"  y="14.5" width="7"   height="3.5" fill="white"/>
            <line x1="19" y1="7"  x2="28" y2="25" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="28" y1="7"  x2="19" y2="25" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          </svg>
          <div class="size-label">128px</div>
        </div>
        <div>
          <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#0F172A"/>
            <rect x="4"  y="7"    width="3.5" height="18"  fill="white"/>
            <rect x="4"  y="7"    width="10"  height="3.5" fill="white"/>
            <rect x="4"  y="14.5" width="7"   height="3.5" fill="white"/>
            <line x1="19" y1="7"  x2="28" y2="25" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="28" y1="7"  x2="19" y2="25" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          </svg>
          <div class="size-label">32px</div>
        </div>
        <div>
          <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#0F172A"/>
            <rect x="4"  y="7"    width="3.5" height="18"  fill="white"/>
            <rect x="4"  y="7"    width="10"  height="3.5" fill="white"/>

          </svg>
          <div class="size-label">16px</div>
        </div>
      </div>
      <div class="label"><strong>Option 2</strong>FX monogramme</div>
    </div>

    <!-- Option 3 : Double flèche -->
    <div class="option">
      <div class="sizes">
        <div>
          <svg width="128" height="128" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <line x1="5"  y1="12" x2="21" y2="12" stroke="white" stroke-width="3"   stroke-linecap="round"/>
            <polygon points="19,9 26,12 19,15" fill="white"/>
            <line x1="27" y1="20" x2="11" y2="20" stroke="white" stroke-width="3"   stroke-linecap="round"/>
            <polygon points="13,17 6,20 13,23" fill="white"/>
          </svg>
          <div class="size-label">128px</div>
        </div>
        <div>
          <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <line x1="5"  y1="12" x2="21" y2="12" stroke="white" stroke-width="3"   stroke-linecap="round"/>
            <polygon points="19,9 26,12 19,15" fill="white"/>
            <line x1="27" y1="20" x2="11" y2="20" stroke="white" stroke-width="3"   stroke-linecap="round"/>
            <polygon points="13,17 6,20 13,23" fill="white"/>
          </svg>

        </div>
        <div>
          <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <line x1="5"  y1="12" x2="21" y2="12" stroke="white" stroke-width="3"   stroke-linecap="round"/>
            <polygon points="19,9 26,12 19,15" fill="white"/>

      <div class="label"><strong>Option 3</strong>Double flèche flux</div>
    </div>

    <div class="option">
      <div class="sizes">
        <div>
          <svg width="128" height="128" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <rect x="7"   y="7"  width="4.5" height="18" fill="white"/>
            <rect x="7"   y="7"  width="14"  height="4.5" fill="white"/>
            <rect x="7"   y="15" width="10"  height="4"   fill="white"/>

        </div>
        <div>
          <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <rect x="7"   y="7"  width="4.5" height="18" fill="white"/>
            <rect x="7"   y="7"  width="14"  height="4.5" fill="white"/>
            <rect x="7"   y="15" width="10"  height="4"   fill="white"/>
            <circle cx="24" cy="8" r="4" fill="#93C5FD"/>
          </svg>
          <div class="size-label">32px</div>
        </div>
        <div>
          <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
            <rect x="7"   y="7"  width="4.5" height="18" fill="white"/>
            <rect x="7"   y="7"  width="14"  height="4.5" fill="white"/>
            <rect x="7"   y="15" width="10"  height="4"   fill="white"/>
            <circle cx="24" cy="8" r="4" fill="#93C5FD"/>
          </svg>
          <div class="size-label">16px</div>
        </div>
      </div>
      <div class="label"><strong>Option 4</strong>F + accent IA</div>
    </div>

  </div>

</body>
</html>
